name: SmartThings Gateway

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "packages/smartthings-gateway/**"
      - "deploy/smartthings-gateway/**"
      - ".github/workflows/smartthings-gateway.yaml"

env:
  IMAGE_NAME: ghcr.io/j5hjun/growful-smartthings-gateway

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: gateway_test
          POSTGRES_PASSWORD: gateway-test-password
          POSTGRES_USER: gateway
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gateway -d gateway_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: packages/smartthings-gateway
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: packages/smartthings-gateway/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: packages/smartthings-gateway/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test:integration
        env:
          TEST_DATABASE_URL: postgresql://gateway:gateway-test-password@127.0.0.1:5432/gateway_test
      - run: pnpm build
      - name: Test deployment rollback
        run: bash ../../deploy/smartthings-gateway/deploy.test.sh
      - name: Test production preflight
        run: bash ../../deploy/smartthings-gateway/preflight.test.sh
      - name: Smoke test digest-pinned deployment image with Compose
        run: |
          docker run --detach --name smartthings-gateway-ci-registry --publish 5001:5000 registry:2
          for attempt in {1..30}; do
            if curl --fail --silent 'http://127.0.0.1:5001/v2/' >/dev/null; then
              break
            fi
            if [[ "$attempt" == 30 ]]; then
              exit 1
            fi
            sleep 1
          done
          image_tag='localhost:5001/growful-smartthings-gateway:ci'
          docker build --tag "$image_tag" .
          docker push "$image_tag"
          image_reference="$(docker image inspect --format '{{index .RepoDigests 0}}' "$image_tag")"
          [[ "$image_reference" =~ ^[^[:space:]@]+@sha256:[0-9a-f]{64}$ ]]
          bash ../../deploy/smartthings-gateway/ci-smoke.sh "$image_reference" ci
      - name: Clean up local image registry
        if: always()
        run: docker rm --force smartthings-gateway-ci-registry >/dev/null 2>&1 || true

  publish:
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    concurrency:
      group: smartthings-gateway-publish-${{ github.sha }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      ready: ${{ steps.freshness.outputs.publish }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: freshness
        name: Check commit is current gateway release
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          current_release="$(git rev-list -1 origin/main -- packages/smartthings-gateway deploy/smartthings-gateway .github/workflows/smartthings-gateway.yaml)"
          test -n "$current_release"
          if [[ "$current_release" == "$GITHUB_SHA" ]]; then
            echo 'publish=true' >> "$GITHUB_OUTPUT"
          else
            echo 'publish=false' >> "$GITHUB_OUTPUT"
            echo "Skipping stale commit $GITHUB_SHA; current gateway release is $current_release"
          fi
      - if: steps.freshness.outputs.publish == 'true'
        uses: docker/setup-buildx-action@v4
      - if: steps.freshness.outputs.publish == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v7
        if: steps.freshness.outputs.publish == 'true'
        with:
          context: packages/smartthings-gateway
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: needs.publish.outputs.ready == 'true'
    needs: publish
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: 100.72.144.111
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      IMAGE_REFERENCE: ghcr.io/j5hjun/growful-smartthings-gateway@${{ needs.publish.outputs.image-digest }}
      PUBLIC_BASE_URL: https://smartthings.growful.click
      RELEASE_ID: ${{ github.sha }}
    concurrency:
      group: smartthings-gateway-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: freshness
        name: Check commit is current gateway release
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          current_release="$(git rev-list -1 origin/main -- packages/smartthings-gateway deploy/smartthings-gateway .github/workflows/smartthings-gateway.yaml)"
          test -n "$current_release"
          if [[ "$current_release" == "$GITHUB_SHA" ]]; then
            echo 'deploy=true' >> "$GITHUB_OUTPUT"
          else
            echo 'deploy=false' >> "$GITHUB_OUTPUT"
            echo "Skipping stale commit $GITHUB_SHA; current gateway release is $current_release"
          fi
      - if: steps.freshness.outputs.deploy == 'true'
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: 100.72.144.111
      - name: Copy deployment files
        if: steps.freshness.outputs.deploy == 'true'
        run: |
          test -n "$DEPLOY_USER"
          tar -C deploy/smartthings-gateway -cf - compose.yaml deploy.sh preflight.sh |
            tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" \
              "mkdir -p \"\$HOME/app/smartthings-gateway/releases/$RELEASE_ID\" && tar -xf - -C \"\$HOME/app/smartthings-gateway/releases/$RELEASE_ID\""
      - name: Check production prerequisites
        if: steps.freshness.outputs.deploy == 'true'
        run: |
          tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            bash -s -- "$IMAGE_REFERENCE" "$RELEASE_ID" <<'REMOTE'
          set -e
          deployment_root="$HOME/app/smartthings-gateway"
          release_dir="$deployment_root/releases/$2"
          DEPLOYMENT_ROOT="$deployment_root" bash "$release_dir/preflight.sh" "$1" "$2"
          REMOTE
      - id: mutation_freshness
        name: Recheck gateway release before mutation
        if: steps.freshness.outputs.deploy == 'true'
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          current_release="$(git rev-list -1 origin/main -- packages/smartthings-gateway deploy/smartthings-gateway .github/workflows/smartthings-gateway.yaml)"
          test -n "$current_release"
          if [[ "$current_release" == "$GITHUB_SHA" ]]; then
            echo 'deploy=true' >> "$GITHUB_OUTPUT"
          else
            echo 'deploy=false' >> "$GITHUB_OUTPUT"
            echo "Skipping stale commit $GITHUB_SHA; current gateway release is $current_release"
          fi
      - name: Deploy image
        if: steps.mutation_freshness.outputs.deploy == 'true'
        run: |
          tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            bash -s -- "$IMAGE_REFERENCE" "$RELEASE_ID" "$PUBLIC_BASE_URL" <<'REMOTE'
          set -e
          deployment_root="$HOME/app/smartthings-gateway"
          release_dir="$deployment_root/releases/$2"
          DEPLOYMENT_ROOT="$deployment_root" PUBLIC_BASE_URL="$3" bash "$release_dir/deploy.sh" "$1" "$2"
          REMOTE
      - name: Verify public HTTPS endpoints
        if: steps.mutation_freshness.outputs.deploy == 'true'
        run: |
          health_response="$(curl --fail --silent --show-error --retry 5 --retry-all-errors "$PUBLIC_BASE_URL/healthz")"
          test "$health_response" = '{"status":"ok"}'

          connection_response="$(curl --fail --silent --show-error --retry 5 --retry-all-errors "$PUBLIC_BASE_URL/connection")"
          jq --exit-status '.connected == true or .connected == false' <<<"$connection_response" >/dev/null

          oauth_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' "$PUBLIC_BASE_URL/oauth/start")"
          test "$oauth_status" = '401'
