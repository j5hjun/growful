name: SmartThings Gateway

on:
  pull_request:
    paths:
      - "packages/smartthings-gateway/**"
      - "deploy/smartthings-gateway/**"
      - ".github/workflows/smartthings-gateway.yaml"
  push:
    branches:
      - main
    paths:
      - "packages/smartthings-gateway/**"
      - "deploy/smartthings-gateway/**"
      - ".github/workflows/smartthings-gateway.yaml"

env:
  IMAGE_NAME: ghcr.io/j5hjun/growful-smartthings-gateway

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: gateway_test
          POSTGRES_PASSWORD: gateway-test-password
          POSTGRES_USER: gateway
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gateway -d gateway_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: packages/smartthings-gateway
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: packages/smartthings-gateway/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: packages/smartthings-gateway/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test:integration
        env:
          TEST_DATABASE_URL: postgresql://gateway:gateway-test-password@127.0.0.1:5432/gateway_test
      - run: pnpm build
      - name: Test deployment rollback
        run: bash ../../deploy/smartthings-gateway/deploy.test.sh
      - name: Build deployment image
        run: docker build --tag smartthings-gateway:ci .
      - name: Smoke test deployment image with Compose
        run: bash ../../deploy/smartthings-gateway/ci-smoke.sh smartthings-gateway ci

  publish:
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.image.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: image
        run: echo "tag=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
      - uses: docker/build-push-action@v7
        with:
          context: packages/smartthings-gateway
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: 100.72.144.111
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      IMAGE_TAG: ${{ needs.publish.outputs.image-tag }}
      PUBLIC_BASE_URL: https://smartthings.growful.click
    concurrency:
      group: smartthings-gateway-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: 100.72.144.111
      - name: Copy deployment files
        run: |
          test -n "$DEPLOY_USER"
          tar -C deploy/smartthings-gateway -cf - compose.yaml deploy.sh preflight.sh |
            tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" \
              "mkdir -p \"\$HOME/app/smartthings-gateway/releases/$IMAGE_TAG\" && tar -xf - -C \"\$HOME/app/smartthings-gateway/releases/$IMAGE_TAG\""
      - name: Check production prerequisites
        run: |
          tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            bash -s -- "$IMAGE_NAME" "$IMAGE_TAG" <<'REMOTE'
          set -e
          deployment_root="$HOME/app/smartthings-gateway"
          release_dir="$deployment_root/releases/$2"
          DEPLOYMENT_ROOT="$deployment_root" bash "$release_dir/preflight.sh" "$1" "$2"
          REMOTE
      - name: Deploy image
        run: |
          tailscale ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            bash -s -- "$IMAGE_NAME" "$IMAGE_TAG" "$PUBLIC_BASE_URL" <<'REMOTE'
          set -e
          deployment_root="$HOME/app/smartthings-gateway"
          release_dir="$deployment_root/releases/$2"
          DEPLOYMENT_ROOT="$deployment_root" PUBLIC_BASE_URL="$3" bash "$release_dir/deploy.sh" "$1" "$2"
          REMOTE
      - name: Verify public HTTPS endpoints
        run: |
          health_response="$(curl --fail --silent --show-error --retry 5 --retry-all-errors "$PUBLIC_BASE_URL/healthz")"
          test "$health_response" = '{"status":"ok"}'

          connection_response="$(curl --fail --silent --show-error --retry 5 --retry-all-errors "$PUBLIC_BASE_URL/connection")"
          jq --exit-status '.connected == true or .connected == false' <<<"$connection_response" >/dev/null

          oauth_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' "$PUBLIC_BASE_URL/oauth/start")"
          test "$oauth_status" = '302'
