services:
  gateway:
    image: "${SMARTTHINGS_GATEWAY_IMAGE_NAME:?SMARTTHINGS_GATEWAY_IMAGE_NAME is required}@${SMARTTHINGS_GATEWAY_IMAGE_DIGEST:?SMARTTHINGS_GATEWAY_IMAGE_DIGEST is required}"
    restart: unless-stopped
    stop_grace_period: 120s
    env_file:
      - "${GATEWAY_ENV_FILE:-.env}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:8100/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 6
    ports:
      - "127.0.0.1:8100:8100"

  postgres:
    image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartthings_gateway
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_USER: gateway
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U gateway -d smartthings_gateway
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
