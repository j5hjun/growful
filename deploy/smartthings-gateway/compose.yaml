services:
  gateway:
    image: "${SMARTTHINGS_GATEWAY_IMAGE_NAME:?SMARTTHINGS_GATEWAY_IMAGE_NAME is required}@${SMARTTHINGS_GATEWAY_IMAGE_DIGEST:?SMARTTHINGS_GATEWAY_IMAGE_DIGEST is required}"
    restart: unless-stopped
    stop_grace_period: 120s
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - "${GATEWAY_ENV_FILE:-.env}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:8100/readyz').then(async r=>{if(!r.ok||await r.text()!=='{"status":"ready"}')process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 6
    ports:
      - "127.0.0.1:${SMARTTHINGS_GATEWAY_HOST_PORT:-8100}:8100"

  postgres:
    image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartthings_gateway
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_USER: gateway
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U gateway -d smartthings_gateway
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
